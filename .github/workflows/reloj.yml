name: Bot Dolar Diario

on:
  schedule:
    - cron: '0 13 * * *' # 10:00 AM Argentina
  workflow_dispatch:      # Botón para probarlo a mano

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar requests
        run: pip install requests
      - name: Ejecutar Bot
        run: python bot_dolar.py
      - name: Guardar cambios
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ultimo_precio.txt || true
          git commit -m "Actualizar precio" || exit 0
          git push
